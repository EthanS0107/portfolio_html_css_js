  <rect x="8" y="8" width="80" height="80" rx="22" fill="url(#esMarkBg)" />
  <rect x="8" y="8" width="80" height="80" rx="22" fill="none" stroke="#f4ebd0" stroke-opacity="0.42" stroke-width="1.5" />
