<svg xmlns="http://www.w3.org/2000/svg" width="420" height="96" viewBox="0 0 420 96" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Ethan Serville Logo</title>
  <desc id="logoDesc">Logo horizontal premium avec monogramme ES stylise</desc>
  <defs>
    <linearGradient id="esMarkBg" x1="8%" y1="8%" x2="92%" y2="92%">
      <stop offset="0%" stop-color="#d98a72" />
      <stop offset="100%" stop-color="#8f454b" />
    </linearGradient>
    <radialGradient id="esMarkGlow" cx="72%" cy="22%" r="72%">
